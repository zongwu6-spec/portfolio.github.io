<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iSEE Award | WUZONG Design</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { background: #F4F4F4; color: #111; font-family: 'Inter', sans-serif; }
        .micro-label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.15em; color: #999; }
        .sticky-sidebar { position: sticky; top: 10rem; }
    </style>
</head>
<body class="antialiased">
    <nav class="fixed top-0 w-full z-50 flex justify-between px-8 py-10 items-center mix-blend-difference">
        <a href="index.html" class="text-[10px] font-bold uppercase tracking-widest">← Back</a>
    </nav>

    <main class="px-6 md:px-12 pt-48 pb-32">
        <div class="grid grid-cols-1 md:grid-cols-12 gap-10">
            <aside class="md:col-span-3">
                <div class="sticky-sidebar space-y-12">
                    <div>
                        <span class="micro-label">Project</span>
                        <h1 class="text-lg font-bold mt-2 uppercase tracking-tighter">iSEE全球奖品牌识别升级</h1>
                    </div>
                    <div>
                        <span class="micro-label">Sector</span>
                        <p class="text-xs font-medium mt-1">To B Industry / Food Innovation</p>
                    </div>
                    <div>
                        <span class="micro-label">Concept</span>
                        <p class="text-[11px] leading-relaxed text-zinc-500 mt-2">从0到1建立用户对全新品牌的认知。视觉概念以“眼睛”与“放射线”为核心，象征创新精神的传播与扩散。通过标准化视觉规范，提升物料制作效率与品牌辨识度。</p>
                    </div>
                </div>
            </aside>

            <div class="md:col-start-5 md:col-span-8 space-y-20">
                <div class="bg-zinc-200 aspect-video rounded-xl overflow-hidden shadow-sm">
                    <img src="https://images.unsplash.com/photo-1551288049-bbbda546697a?auto=format&fit=crop&q=80&w=1600" class="w-full h-full object-cover">
                </div>
                <div class="grid grid-cols-2 gap-10">
                    <div class="bg-zinc-200 aspect-square rounded-xl overflow-hidden"><img src="https://images.unsplash.com/photo-1460925895917-afdab827c52f?auto=format&fit=crop&q=80&w=800" class="w-full h-full object-cover"></div>
                    <div class="bg-zinc-200 aspect-square rounded-xl overflow-hidden"><img src="https://images.unsplash.com/photo-1542744094-24638eff58bb?auto=format&fit=crop&q=80&w=800" class="w-full h-full object-cover"></div>
                </div>
            </div>
        </div>
    </main>

</html>
