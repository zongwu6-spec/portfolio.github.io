<!DOCTYPE html>
<html lang="zh-CN">
<head>

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #FFD23F; color: #000; font-family: 'Inter', sans-serif; }

<body class="antialiased">
