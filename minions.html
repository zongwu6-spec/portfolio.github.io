<!DOCTYPE html>
<html lang="zh-CN">

    <title>Project Details | Minions Sport</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;600&display=swap" rel="stylesheet">
    <style>
        body { background: #fff; color: #000; font-family: 'Inter', sans-serif; }
        .hero-img { height: 90vh; overflow: hidden; clip-path: inset(0% 0% 0% 0%); animation: imgOpen 1.8s cubic-bezier(0.2, 1, 0.3, 1); }
        @keyframes imgOpen { from { clip-path: inset(10% 10% 10% 10%); } to { clip-path: inset(0% 0% 0% 0%); } }
        .archive-text { font-size: 11px; line-height: 2; letter-spacing: 0.05em; color: #666; }
        .archive-title { font-size: 11px; font-weight: 600; text-transform: uppercase; margin-bottom: 15px; display: block; color: #000; }
        .color-dot { width: 12px; height: 12px; border-radius: 50%; display: inline-block; margin-right: 8px; border: 1px solid #eee; }
    </style>
</head>
<body class="antialiased">

    <nav class="fixed top-0 w-full z-50 p-10 flex justify-between mix-blend-difference text-black">
        <a href="index.html" class="text-[11px] font-bold uppercase tracking-widest">← Index</a>
    </nav>

    <section class="hero-img bg-zinc-100">
        <img src="https://images.unsplash.com/photo-1593359674241-55cd4bd7e44a?auto=format&fit=crop&q=80&w=2000" class="w-full h-full object-cover">
    </section>

    <section class="px-6 md:px-12 py-32 grid grid-cols-1 md:grid-cols-12 gap-16">

                    </div>
                </div>
            </div>
        </div>
        
        <div class="md:col-span-8">

                在国际 IP 的框架内创作，我们负责酷萌体育（Minions）运动系列的视觉延展与衍生品开发。设计重点在于严格遵循 Universal 的版权方指南，确保 IP 形象在商业落地中的高度一致性，同时注入运动时尚的视觉活力。

                    <div class="bg-zinc-50 overflow-hidden aspect-square"><img src="https://images.unsplash.com/photo-1511556532299-8f662fc26c06?auto=format&fit=crop&q=80&w=800" class="w-full h-full object-cover"></div>
                </div>
            </div>
        </div>
    </section>

    <footer class="py-32 text-center bg-zinc-50">
        <a href="index.html" class="text-xs font-bold uppercase tracking-[0.2em] hover:opacity-50 transition">Back to Selected Works</a>
