<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Theatre Project</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; }
        .slider-box { position: relative; width: 100%; height: 60vh; overflow: hidden; border-radius: 1rem; }
        #before { position: absolute; top: 0; left: 0; width: 50%; height: 100%; z-index: 10; border-right: 2px solid white; overflow: hidden; }
        #before img { width: 100vw; height: 60vh; object-fit: cover; filter: grayscale(1); }
    </style>
</head>
<body>
    <nav class="p-8"><a href="index.html" class="font-bold tracking-tighter">← BACK</a></nav>
    <header class="px-8 py-20 max-w-6xl mx-auto">
        <h1 class="text-7xl font-black uppercase italic mb-6">Orange Sky<br>Golden Harvest</h1>
        <p class="text-zinc-400 text-xl max-w-2xl">通过 Rhino 3D 建模还原真实光影感，为线下剧场打造沉浸式导视系统与美陈装置。</p>
    </header>
    <section class="px-8 pb-40 max-w-6xl mx-auto">
        <div class="slider-box" id="slider">
            <img src="https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?auto=format&fit=crop&q=80&w=1600" class="w-full h-full object-cover">
            <div id="before"><img src="https://images.unsplash.com/photo-1516321497487-e288fb19713f?auto=format&fit=crop&q=80&w=1600"></div>
        </div>
        <p class="mt-4 text-xs font-mono text-zinc-500 uppercase tracking-widest text-center">Move Mouse to Compare: 3D Model vs Reality</p>
    </section>
    <script>
        const s = document.getElementById('slider'), b = document.getElementById('before');
        s.addEventListener('mousemove', e => b.style.width = (e.offsetX / s.offsetWidth * 100) + '%');
    </script>
</body>
</html>
