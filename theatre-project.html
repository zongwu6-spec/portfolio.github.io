<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orange Sky Golden Harvest | Project</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;900&display=swap" rel="stylesheet">
    <style>
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; }
        .hero-title { font-size: 12vw; line-height: 0.8; font-weight: 900; text-transform: uppercase; letter-spacing: -0.05em; italic; }
        .slider-container { position: relative; width: 100%; height: 70vh; overflow: hidden; border-radius: 20px; }
        #before-box { position: absolute; top: 0; left: 0; width: 50%; height: 100%; z-index: 10; border-right: 2px solid #fff; overflow: hidden; }
        #before-box img { width: 100vw; height: 70vh; object-fit: cover; filter: grayscale(1) contrast(1.2); }
    </style>
</head>
<body class="antialiased">
    <nav class="fixed top-0 w-full z-50 p-8 flex justify-between mix-blend-difference">
        <a href="index.html" class="font-bold tracking-tighter uppercase">← Close</a>
        <span class="text-[10px] font-mono opacity-50">ENT / 01</span>
    </nav>

    <header class="pt-40 px-6 md:px-16 pb-20">
        <h1 class="hero-title italic">Orange Sky<br><span class="text-zinc-800 not-italic">Golden Harvest</span></h1>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-10 mt-20 border-t border-zinc-900 pt-10 text-zinc-500 uppercase text-[10px] font-bold tracking-widest">
            <div><p class="mb-2 text-white">Services</p><p>Brand Identity / 3D Space / Signage</p></div>
            <div><p class="mb-2 text-white">Concept</p><p>沉浸式叙事与商业物理空间的视觉重构</p></div>
            <div><p class="mb-2 text-white">Year</p><p>2024 - 2025</p></div>
        </div>
    </header>

    <section class="px-6 md:px-16 py-20">
        <div class="slider-container" id="slider">
            <img src="https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?auto=format&fit=crop&q=80&w=1600" class="w-full h-full object-cover">
            <div id="before-box">
                <img src="https://images.unsplash.com/photo-1516321497487-e288fb19713f?auto=format&fit=crop&q=80&w=1600">
            </div>
        </div>
        <p class="text-center mt-6 text-zinc-600 text-[10px] uppercase tracking-[0.3em]">Drag to Compare: Model vs Reality</p>
    </section>

    <footer class="py-40 text-center">
        <a href="foodaily.html" class="text-4xl font-black uppercase hover:opacity-50 transition">Next Case: Foodaily ↗</a>
    </footer>

    <script>
        const s = document.getElementById('slider'), b = document.getElementById('before-box');
        const move = (e) => {
            let x = (e.pageX || e.touches[0].pageX) - s.offsetLeft;
            b.style.width = (x / s.offsetWidth * 100) + '%';
        };
        s.addEventListener('mousemove', move);
        s.addEventListener('touchmove', move);
    </script>
</body>
</html>
