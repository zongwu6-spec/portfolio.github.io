<!DOCTYPE html>
<html lang="zh-CN">
<head>

    <title>Portfolio | StudioPros Style</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;900&display=swap" rel="stylesheet">
    <style>
        :root { --cursor-size: 20px; }
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        
        /* 页面载入动画 */
        .line-reveal { clip-path: polygon(0 0, 100% 0, 100% 100%, 0 100%); animation: reveal 1.2s cubic-bezier(0.77, 0, 0.175, 1); }
        @keyframes reveal { from { transform: translateY(100%); } to { transform: translateY(0); } }

        /* 自定义光标 */
        #cursor { width: var(--cursor-size); height: var(--cursor-size); background: #fff; border-radius: 50%; position: fixed; pointer-events: none; mix-blend-difference: transition: transform 0.2s; z-index: 9999; display: none; }
        @media (min-width: 768px) { #cursor { display: block; } }

        /* 项目卡片 hover */
        .project-card img { transition: transform 0.8s cubic-bezier(0.16, 1, 0.3, 1); }
        .project-card:hover img { transform: scale(1.05); }
        .project-card:hover .arrow { transform: translate(5px, -5px); }
    </style>
</head>
