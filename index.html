<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selected Works | IT-Simple Style</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;600&display=swap" rel="stylesheet">
    <style>
        body { background: #fff; color: #000; font-family: 'Inter', sans-serif; }
        .reveal { opacity: 0; transform: translateY(40px); transition: all 1.2s cubic-bezier(0.25, 0.1, 0.25, 1); }
        .reveal.active { opacity: 1; transform: translateY(0); }
        .project-card img { transition: transform 1.5s cubic-bezier(0.25, 0.1, 0.25, 1); }
        .project-card:hover img { transform: scale(1.03); }
        .nav-link { font-size: 11px; letter-spacing: 0.1em; font-weight: 600; }
    </style>
</head>
<body class="antialiased">

    <nav class="fixed top-0 w-full z-50 flex justify-between px-10 py-10 items-center mix-blend-difference">
        <div class="nav-link uppercase">Studio.Portfolio</div>
        <div class="flex space-x-12">
            <a href="#work" class="nav-link uppercase hover:opacity-50">Work</a>
            <a href="mailto:design@example.com" class="nav-link uppercase hover:opacity-50">Contact</a>
        </div>
    </nav>

    <section id="work" class="px-6 md:px-12 pt-40 pb-20">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-x-16 gap-y-32">
            
            <div class="reveal">
                <a href="theatre.html" class="project-card group block">
                    <div class="overflow-hidden bg-zinc-50 aspect-[4/5] md:aspect-[3/4]">
                        <img src="https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?auto=format&fit=crop&q=80&w=1200" class="w-full h-full object-cover">
                    </div>
                    <div class="mt-6 flex justify-between items-baseline">
                        <h2 class="text-xs font-bold uppercase tracking-widest">Orange Sky Golden Harvest</h2>
                        <span class="text-[10px] text-zinc-400">2024 — Theatre Branding</span>
                    </div>
                </a>
            </div>

            <div class="reveal md:mt-40">
                <a href="foodaily.html" class="project-card group block">
                    <div class="overflow-hidden bg-zinc-50 aspect-[4/5] md:aspect-[3/4]">
                        <img src="https://images.unsplash.com/photo-1540575861501-7cf05a4b125a?auto=format&fit=crop&q=80&w=1200" class="w-full h-full object-cover">
                    </div>
                    <div class="mt-6 flex justify-between items-baseline">
                        <h2 class="text-xs font-bold uppercase tracking-widest">Foodaily Expo</h2>
                        <span class="text-[10px] text-zinc-400">2023 — Industry</span>
                    </div>
                </a>
            </div>

            <div class="reveal md:col-span-2 max-w-4xl mx-auto w-full">
                <a href="minions.html" class="project-card group block">
                    <div class="overflow-hidden bg-zinc-50 aspect-video">
                        <img src="https://images.unsplash.com/photo-1593359674241-55cd4bd7e44a?auto=format&fit=crop&q=80&w=1600" class="w-full h-full object-cover">
                    </div>
                    <div class="mt-6 flex justify-between items-baseline">
                        <h2 class="text-xs font-bold uppercase tracking-widest">Minions Sport</h2>
                        <span class="text-[10px] text-zinc-400">2022 — IP Campaign</span>
                    </div>
                </a>
            </div>

        </div>
    </section>

    <footer class="py-40 text-center border-t border-zinc-100 mx-12">
        <p class="text-[10px] font-bold uppercase tracking-widest opacity-30">© 2026 Your Studio. All Rights Reserved.</p>
    </footer>

    <script>
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => { if (entry.isIntersecting) entry.target.classList.add('active'); });
        }, { threshold: 0.1 });
        document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
    </script>
</body>
</html>
