<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visual Designer | Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; }
        .reveal { opacity: 0; transform: translateY(30px); transition: all 0.8s ease-out; }
        .reveal.active { opacity: 1; transform: translateY(0); }
    </style>
</head>
<body class="overflow-x-hidden">
    <nav class="fixed top-0 w-full z-50 flex justify-between px-8 py-6 mix-blend-difference">
        <div class="text-xl font-black">STUDIO.DESIGN</div>
        <div class="space-x-6 text-xs font-bold uppercase tracking-widest">
            <a href="#work" class="hover:text-zinc-400">Work</a>
            <a href="mailto:your@email.com" class="hover:text-zinc-400">Contact</a>
        </div>
    </nav>

    <section class="h-screen flex flex-col justify-center px-8 md:px-20">
        <h1 class="text-[12vw] leading-[0.85] font-black uppercase tracking-tighter">Visual<br><span class="text-zinc-800">Designer</span></h1>
        <p class="mt-10 max-w-xl text-zinc-400 text-lg md:text-2xl font-light">4年深耕文旅、IP与行业峰会。用 3D 建模与品牌逻辑构建沉浸式视觉场域。</p>
    </section>

    <section id="work" class="px-8 md:px-20 py-24 bg-white text-black rounded-t-[40px]">
        <div class="grid grid-cols-1 md:grid-cols-12 gap-10">
            <a href="theatre.html" class="md:col-span-8 reveal group">
                <div class="overflow-hidden rounded-2xl aspect-video bg-zinc-100 mb-6">
                    <img src="https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?auto=format&fit=crop&q=80&w=1200" class="w-full h-full object-cover group-hover:scale-105 transition duration-700">
                </div>
                <h3 class="text-3xl font-black uppercase italic tracking-tighter">Orange Sky Golden Harvest</h3>
                <p class="text-zinc-500 font-bold uppercase text-xs mt-2">Theatre Branding / 3D Space</p>
            </a>

            <a href="foodaily.html" class="md:col-span-4 reveal group self-center" style="transition-delay: 0.1s">
                <div class="overflow-hidden rounded-2xl aspect-square bg-zinc-100 mb-6">
                    <img src="https://images.unsplash.com/photo-1540575861501-7cf05a4b125a?auto=format&fit=crop&q=80&w=800" class="w-full h-full object-cover group-hover:scale-105 transition duration-700">
                </div>
                <h3 class="text-xl font-black uppercase tracking-tighter">Foodaily Expo</h3>
                <p class="text-zinc-500 font-bold uppercase text-xs mt-2">B2B Branding / Digital Design</p>
            </a>

            <a href="minions.html" class="md:col-span-12 reveal group" style="transition-delay: 0.2s">
                <div class="overflow-hidden rounded-2xl aspect-[21/9] bg-zinc-100 mb-6">
                    <img src="https://images.unsplash.com/photo-1593359674241-55cd4bd7e44a?auto=format&fit=crop&q=80&w=1600" class="w-full h-full object-cover group-hover:scale-105 transition duration-700">
                </div>
                <h3 class="text-3xl font-black uppercase tracking-tighter">Minions IP Campaign</h3>
                <p class="text-zinc-500 font-bold uppercase text-xs mt-2">Global IP / Product Design</p>
            </a>
        </div>
    </section>

    <script>
        const scrollReveal = () => {
            document.querySelectorAll('.reveal').forEach(el => {
                if (el.getBoundingClientRect().top < window.innerHeight - 50) el.classList.add('active');
            });
        };
        window.addEventListener('scroll', scrollReveal);
        scrollReveal();
    </script>
</body>
</html>
